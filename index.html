<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MySQL PRATICA — Exercícios MySQL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
:root {
  --bg:       #0E1117;
  --surface:  #161B27;
  --surface2: #1E2535;
  --surface3: #252D40;
  --border:   #2A3348;
  --border2:  #3A4560;
  --accent:   #4FFFB0;
  --accent2:  #00D4FF;
  --warn:     #00D4FF;
  --text:     #F0F4FF;
  --text2:    #C0CCDD;
  --text3:    #5A6480;
  --green:    #4FFFB0;
  --red:      #FF6B6B;
  --purple:   #C084FC;
  --mono:     'Fira Code', 'JetBrains Mono', monospace;
  --sans:     'DM Sans', sans-serif;
  --display:  'Syne', sans-serif;
  --radius:   10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.65;
}

/* ── LOADING ── */
.loading-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1000;
}
.loading-logo {
  font-family: var(--display); font-size: 2rem; font-weight: 800;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 20px; letter-spacing: 1px;
}
.loading-spinner {
  width: 34px; height: 34px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { margin-top: 12px; font-size: .8rem; color: var(--text3); font-family: var(--mono); }

/* ── LAYOUT ── */
.layout { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: 248px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto; display: flex; flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.sidebar-logo {
  padding: 20px 18px 14px;
  border-bottom: 1px solid var(--border);
}
.logo-text {
  font-family: var(--display); font-size: 1.15rem; font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.logo-sub { font-size: .65rem; color: var(--text3); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }

.sidebar-progress {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
}
.progress-label { font-size: .65rem; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
.progress-bar-wrap { background: var(--surface3); border-radius: 99px; height: 5px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .5s ease; width: 0%; }
.progress-count { font-size: .73rem; color: var(--text2); margin-top: 5px; }

.sidebar-nav { flex: 1; padding: 8px 0 16px; }
.nav-module-title {
  font-size: .62rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text3); padding: 14px 18px 5px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 18px; cursor: pointer;
  font-size: .8rem; color: var(--text2);
  transition: all .15s; border-left: 2px solid transparent;
}
.nav-item:hover { background: var(--surface2); color: var(--text); border-left-color: var(--border2); }
.nav-item.active { background: rgba(79,255,176,.07); color: var(--accent); border-left-color: var(--accent); }
.nav-item .nav-check {
  width: 15px; height: 15px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: .58rem; flex-shrink: 0;
}
.nav-item.done .nav-check { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
.nav-item.active .nav-check { border-color: var(--accent); }
.nav-num { font-family: var(--mono); font-size: .68rem; flex-shrink: 0; }
.nav-item-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── MAIN ── */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 32px; display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 10;
}
.topbar-db { display: flex; align-items: center; gap: 8px; font-size: .76rem; color: var(--text2); }
.db-badge {
  background: rgba(79,255,176,.12); color: var(--accent);
  border: 1px solid rgba(79,255,176,.25); border-radius: 5px;
  padding: 2px 8px; font-family: var(--mono); font-size: .7rem; font-weight: 600;
}
.topbar-center { flex: 1; text-align: center; font-size: .76rem; color: var(--text3); font-family: var(--mono); }
.topbar-nav { display: flex; gap: 8px; }
.btn-nav {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
  padding: 5px 13px; border-radius: 7px; font-size: .76rem; cursor: pointer;
  font-family: var(--sans); transition: all .15s;
}
.btn-nav:hover { border-color: var(--border2); color: var(--text); }
.btn-nav:disabled { opacity: .3; cursor: not-allowed; }

/* ── CONTENT WRAPPER (centred) ── */
.content-wrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  padding: 32px 24px 60px;
}
.exercise-area {
  width: 100%;
  max-width: 820px;
}

/* ── MODULE INTRO ── */
.module-intro {
  background: linear-gradient(135deg, var(--surface2), var(--surface));
  border: 1px solid var(--border); border-radius: 14px;
  padding: 24px 26px 20px; margin-bottom: 26px;
}
.module-intro h2 { font-family: var(--display); font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
.module-intro p { font-size: .88rem; color: var(--text); line-height: 1.65; }
.module-level {
  display: inline-block;
  background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius: 20px; padding: 2px 10px;
  font-size: .68rem; color: var(--text3); margin-bottom: 8px;
}
.module-topics { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 12px; }
.module-topic {
  font-family: var(--mono); font-size: .68rem;
  padding: 3px 9px; border-radius: 5px;
  background: var(--surface3); border: 1px solid var(--border); color: var(--text3);
}

/* ── TABLE PREVIEW (SQLZoo style) ── */
.table-previews { margin-bottom: 26px; }
.table-previews-title {
  font-size: .7rem; color: var(--text3); text-transform: uppercase;
  letter-spacing: 1.2px; font-weight: 600; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.table-previews-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.table-preview-block { margin-bottom: 16px; }
.table-preview-name {
  font-family: var(--mono); font-size: .75rem; color: var(--accent);
  font-weight: 600; margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.preview-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
.preview-table {
  width: 100%; border-collapse: collapse;
  font-family: var(--mono); font-size: .75rem;
}
.preview-table th {
  background: var(--surface3); padding: 7px 12px; text-align: left;
  color: var(--accent2); font-weight: 600; font-size: .68rem;
  text-transform: uppercase; letter-spacing: .7px;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.preview-table td {
  padding: 6px 12px; color: var(--text2);
  border-bottom: 1px solid rgba(42,51,72,.6); white-space: nowrap;
}
.preview-table tr:last-child td { border-bottom: none; }
.preview-table tr:hover td { background: var(--surface2); }
.preview-rows-note {
  font-size: .68rem; color: var(--text3); margin-top: 4px;
  font-family: var(--mono); text-align: right;
}

/* ── LEVEL BADGE ── */
.level-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: .68rem; font-weight: 700; padding: 3px 10px;
  border-radius: 20px; letter-spacing: .5px;
}
.level-estagio   { background: rgba(79,255,176,.12); color: #4FFFB0; border: 1px solid rgba(79,255,176,.25); }
.level-jr        { background: rgba(0,212,255,.12);  color: #00D4FF; border: 1px solid rgba(0,212,255,.25); }
.level-nao-estagio { background: rgba(0,212,255,.1); color: #00D4FF; border: 1px solid rgba(0,212,255,.25); }

/* ── EX HEADER ── */
.ex-module-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: .67rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; padding: 3px 9px; border-radius: 5px; margin-bottom: 14px;
}
.ex-header-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; }
.ex-number {
  font-family: var(--display); font-size: 2.8rem; font-weight: 800;
  line-height: 1; opacity: .1; flex-shrink: 0; width: 60px; text-align: right;
}
.ex-title-block { flex: 1; }
.ex-title {
  font-family: var(--display); font-size: 1.3rem; font-weight: 700;
  color: var(--text); margin-bottom: 8px; line-height: 1.2;
}
.ex-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.ex-tag {
  font-family: var(--mono); font-size: .65rem; padding: 2px 7px;
  border-radius: 4px; background: var(--surface3); color: var(--text3); border: 1px solid var(--border);
}

/* ── FN EXPLAINER ── */
.fn-explainer {
  background: linear-gradient(135deg, rgba(0,212,255,.05), rgba(192,132,252,.05));
  border: 1px solid rgba(0,212,255,.18); border-left: 3px solid var(--accent2);
  border-radius: var(--radius); padding: 15px 17px; margin-bottom: 18px;
}
.fn-explainer-title {
  font-family: var(--mono); font-size: .72rem; color: var(--accent2);
  font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 9px;
}
.fn-explainer p { font-size: .86rem; color: var(--text); line-height: 1.65; margin-bottom: 7px; }
.fn-explainer p:last-child { margin: 0; }
.fn-explainer code {
  font-family: var(--mono); font-size: .8rem;
  background: rgba(0,212,255,.1); color: var(--accent2);
  padding: 1px 5px; border-radius: 3px;
}
.fn-syntax {
  background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
  padding: 9px 13px; font-family: var(--mono); font-size: .76rem;
  color: var(--accent); margin-top: 8px; white-space: pre; overflow-x: auto;
}

/* ── PROBLEM BOX ── */
.problem-box {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px; margin-bottom: 18px;
}
.problem-box p { font-size: .9rem; color: var(--text); line-height: 1.7; }
.problem-box strong { color: var(--accent2); font-weight: 600; }
.problem-box code {
  font-family: var(--mono); font-size: .8rem;
  background: var(--surface3); color: var(--accent2); padding: 1px 5px; border-radius: 3px;
}
.problem-box ul { margin: 10px 0 0 18px; }
.problem-box ul li { font-size: .9rem; color: var(--text); margin-bottom: 5px; }
.problem-hint {
  margin-top: 12px; padding: 9px 13px;
  background: rgba(0,212,255,.05); border: 1px solid rgba(0,212,255,.18);
  border-radius: 7px; font-size: .8rem; color: var(--text3);
  display: flex; align-items: flex-start; gap: 7px;
}
.problem-hint strong { color: var(--warn); }

/* ── EDITOR ── */
.editor-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  margin-bottom: 14px; transition: border-color .2s;
}
.editor-wrap:focus-within { border-color: var(--border2); }
.editor-topbar {
  background: var(--surface2); border-bottom: 1px solid var(--border);
  padding: 7px 13px; display: flex; align-items: center; gap: 7px;
}
.editor-dots { display: flex; gap: 5px; }
.editor-dot { width: 10px; height: 10px; border-radius: 50%; }
.editor-dot.r { background: #FF5F57; }
.editor-dot.y { background: #FEBC2E; }
.editor-dot.g { background: #28C840; }
.editor-label { font-size: .65rem; color: var(--text3); font-family: var(--mono); margin-left: auto; letter-spacing: 1px; text-transform: uppercase; }

.sql-editor {
  width: 100%; background: transparent; border: none; outline: none;
  color: var(--accent); font-family: var(--mono); font-size: .86rem;
  line-height: 1.7; padding: 14px 17px; resize: vertical;
  min-height: 110px; max-height: 280px;
}
.sql-editor::placeholder { color: var(--text3); }

.editor-actions {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 13px; border-top: 1px solid var(--border); background: var(--surface2);
}
.btn-run {
  background: var(--accent); color: #000; border: none;
  padding: 7px 18px; border-radius: 7px;
  font-family: var(--display); font-size: .8rem; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .15s;
}
.btn-run:hover { background: #6FFFBF; transform: translateY(-1px); }
.btn-run:active { transform: translateY(0); }

/* ── CLEAR BUTTON ── */
.btn-clear {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.4);
  color: #F87171;
  padding: 7px 16px;
  border-radius: 7px;
  font-family: var(--sans);
  font-size: .78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.btn-clear:hover {
  background: rgba(239, 68, 68, 0.2);
  border-color: #EF4444;
  color: #FCA5A5;
  transform: translateY(-1px);
}
.btn-clear:active { transform: translateY(0); }

.shortcut-hint { margin-left: auto; font-size: .68rem; color: var(--text3); font-family: var(--mono); }

/* ── COPY BUTTON ── */
.btn-copy {
  background: rgba(0, 212, 255, 0.1);
  border: 1px solid rgba(0, 212, 255, 0.4);
  color: #22D3EE;
  padding: 7px 14px;
  border-radius: 7px;
  font-family: var(--sans);
  font-size: .78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-copy:hover {
  background: rgba(0, 212, 255, 0.2);
  border-color: #00D4FF;
  color: #67E8F9;
  transform: translateY(-1px);
}
.btn-copy:active { transform: translateY(0); }
.btn-copy.copied {
  background: rgba(79, 255, 176, 0.15);
  border-color: var(--accent);
  color: var(--accent);
}
.btn-copy svg { width: 15px; height: 15px; }

/* ── RESULTS ── */
.result-area { margin-bottom: 18px; }
.result-status {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 15px; border-radius: var(--radius);
  margin-bottom: 10px; font-size: .86rem; font-weight: 500;
  animation: fadeIn .25s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.result-status.correct  { background: rgba(79,255,176,.07);  border: 1px solid rgba(79,255,176,.28); color: var(--green); }
.result-status.wrong    { background: rgba(255,107,107,.07); border: 1px solid rgba(255,107,107,.28); color: var(--red); }
.result-status.info     { background: rgba(0,212,255,.07);   border: 1px solid rgba(0,212,255,.28);  color: var(--accent2); }
.result-status.error    { background: rgba(255,107,107,.07); border: 1px solid rgba(255,107,107,.28); color: var(--red); }
.status-text { flex: 1; }
.status-rows { font-family: var(--mono); font-size: .72rem; opacity: .7; }

.result-table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
.result-table { width: 100%; border-collapse: collapse; font-size: .8rem; font-family: var(--mono); }
.result-table th {
  background: var(--surface3); padding: 7px 12px; text-align: left;
  color: var(--accent2); font-weight: 600; font-size: .68rem;
  text-transform: uppercase; letter-spacing: .7px;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.result-table td { padding: 6px 12px; color: var(--text2); border-bottom: 1px solid var(--border); white-space: nowrap; }
.result-table tr:last-child td { border-bottom: none; }
.result-table tr:hover td { background: var(--surface2); color: var(--text); }
.null-val { color: var(--text3); font-style: italic; }

/* ── SOLUTION ── */
.btn-solution {
  background: transparent; border: 1px solid var(--border); color: var(--text3);
  padding: 6px 13px; border-radius: 7px; font-size: .76rem;
  cursor: pointer; font-family: var(--sans); transition: all .2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-solution:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,255,176,.07); }
.btn-solution.active { background: rgba(79,255,176,.12); border-color: var(--accent); color: var(--accent); font-weight: 600; }
.solution-block { display: none; margin-top: 10px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); animation: fadeIn .2s ease; }
.solution-block.open { display: block; }
.solution-bar { background: var(--surface2); padding: 7px 13px; font-size: .65rem; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); font-family: var(--mono); }
.solution-code { background: var(--surface); padding: 14px 17px; font-family: var(--mono); font-size: .82rem; line-height: 1.7; white-space: pre; overflow-x: auto; }

/* SQL highlight */
.kw  { color: #63B3ED; font-weight: 600; }
.fn  { color: #68D391; }
.str { color: #F6AD55; }
.cmt { color: #4A5568; font-style: italic; }
.tbl { color: #FC8181; }
.hl-kw { color: #63B3ED; font-weight: 600; }
.hl-fn { color: #68D391; }

/* ── MODULE COLORS ── */
.mod-1 .ex-module-badge, .ex-module-badge.mod-1 { background: rgba(79,255,176,.1);  color: #4FFFB0; border: 1px solid rgba(79,255,176,.22); }
.mod-2 .ex-module-badge, .ex-module-badge.mod-2 { background: rgba(192,132,252,.1); color: #C084FC; border: 1px solid rgba(192,132,252,.22); }
.mod-3 .ex-module-badge, .ex-module-badge.mod-3 { background: rgba(0,212,255,.1);   color: #00D4FF; border: 1px solid rgba(0,212,255,.22); }
.mod-4 .ex-module-badge, .ex-module-badge.mod-4 { background: rgba(0,212,255,.1); color: #00D4FF; border: 1px solid rgba(0,212,255,.22); }
.mod-5 .ex-module-badge, .ex-module-badge.mod-5 { background: rgba(255,107,107,.1); color: #FF6B6B; border: 1px solid rgba(255,107,107,.22); }
.ex-number.mod-1 { color: #4FFFB0; }
.ex-number.mod-2 { color: #C084FC; }
.ex-number.mod-3 { color: #00D4FF; }
.ex-number.mod-4 { color: #00D4FF; }
.ex-number.mod-5 { color: #FF6B6B; }

/* ── CONFETTI ── */
.confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
.conf-piece {
  position: absolute; width: 8px; height: 8px; border-radius: 2px;
  animation: confettiFall 1.1s ease-out forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--surface2); border: 1px solid rgba(79,255,176,.3);
  border-radius: var(--radius); padding: 12px 16px;
  font-size: .86rem; color: var(--green);
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  z-index: 500; animation: slideInRight .3s ease;
  display: flex; align-items: center; gap: 8px;
}
@keyframes slideInRight {
  from { transform: translateX(80px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

/* ── SAVE STATUS ── */
.save-indicator {
  font-size: .68rem; color: var(--text3); font-family: var(--mono);
  display: flex; align-items: center; gap: 5px;
}
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── SIDEBAR TABLES SECTION ── */
.sidebar-tables-section {
  border-top: 1px solid var(--border);
  padding-bottom: 12px;
}
.sidebar-tables-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px 6px;
  cursor: pointer; user-select: none;
}
.sidebar-tables-label {
  font-size: .62rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text3);
  display: flex; align-items: center; gap: 7px;
}
.sidebar-tables-label .tbl-icon {
  font-size: .7rem; color: var(--accent2);
}
.sidebar-tables-toggle {
  font-size: .6rem; color: var(--text3); transition: transform .2s;
}
.sidebar-tables-toggle.open { transform: rotate(180deg); }
.sidebar-tables-body { display: none; }
.sidebar-tables-body.open { display: block; }

.sidebar-tbl-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 18px; cursor: pointer;
  font-size: .75rem; font-family: var(--mono); color: var(--text2);
  transition: all .15s; border-left: 2px solid transparent;
}
.sidebar-tbl-item:hover { background: var(--surface2); color: var(--accent2); border-left-color: var(--accent2); }
.sidebar-tbl-item.active-table { color: var(--accent2); border-left-color: var(--accent2); background: rgba(0,212,255,.05); }
.sidebar-tbl-db-tag {
  font-size: .58rem; padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
  background: var(--surface3); border: 1px solid var(--border);
}
.sidebar-tbl-db-tag.rh { color: var(--purple); border-color: rgba(192,132,252,.3); background: rgba(192,132,252,.08); }
.sidebar-tbl-db-tag.ec { color: var(--accent); border-color: rgba(79,255,176,.3); background: rgba(79,255,176,.08); }

/* ── SIDEBAR DB BUTTONS ── */
.sidebar-db-btn-wrap {
  padding: 6px 12px 12px;
  display: flex; flex-direction: column; gap: 7px;
}
.sidebar-db-btn {
  width: 100%; display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px; cursor: pointer;
  font-family: var(--mono); font-size: .76rem; font-weight: 600;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text2); transition: all .15s; text-align: left;
}
.sidebar-db-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }
.sidebar-db-btn.active-db { }
.sidebar-db-btn.ec:hover, .sidebar-db-btn.ec.active-db { color: var(--accent); border-color: rgba(79,255,176,.4); background: rgba(79,255,176,.07); }
.sidebar-db-btn.rh:hover, .sidebar-db-btn.rh.active-db { color: var(--purple); border-color: rgba(192,132,252,.4); background: rgba(192,132,252,.07); }
.sidebar-db-btn-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.sidebar-db-btn-dot.ec { background: var(--accent); }
.sidebar-db-btn-dot.rh { background: var(--purple); }

/* ── TABLES PAGE ── */
.tables-page { display: none; }
.tables-page.active { display: block; }
.tables-page-header {
  margin-bottom: 28px;
}
.tables-page-title {
  font-family: var(--display); font-size: 1.5rem; font-weight: 800;
  background: linear-gradient(90deg, var(--accent2), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 6px;
}
.tables-page-sub { font-size: .85rem; color: var(--text3); }
.tables-db-section { margin-bottom: 32px; }
.tables-db-label {
  font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  padding: 4px 10px; border-radius: 5px; display: inline-flex; align-items: center; gap: 7px;
  margin-bottom: 16px;
}
.tables-db-label.ec { color: var(--accent); background: rgba(79,255,176,.08); border: 1px solid rgba(79,255,176,.25); }
.tables-db-label.rh { color: var(--purple); background: rgba(192,132,252,.08); border: 1px solid rgba(192,132,252,.25); }
.tables-grid { display: grid; gap: 16px; }
.table-full-block {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
}
.table-full-name {
  background: var(--surface2); padding: 9px 14px; border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: .78rem; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.table-full-name .tbl-kw { color: var(--text3); font-weight: 400; }
.table-full-name .tbl-nm { color: var(--accent2); }
.table-full-name .tbl-count { margin-left: auto; font-size: .65rem; color: var(--text3); font-weight: 400; }
.table-full-wrap { overflow-x: auto; }

/* ── SQLBOLT-STYLE EDITOR ── */
.editor-container {
  position: relative;
  background: var(--surface);
  font-family: var(--mono);
  font-size: .9rem;
  line-height: 1.7;
  min-height: 120px;
  font-feature-settings: "liga" 1, "calt" 1;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.editor-lines {
  position: absolute; top: 0; left: 0;
  width: 38px; height: 100%;
  background: var(--surface2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: flex-end; padding: 14px 7px 14px 0;
  pointer-events: none; overflow: hidden;
  user-select: none;
  z-index: 3;
}
.editor-line-num {
  font-size: .72rem; color: var(--text3); line-height: 1.7;
  min-height: calc(1.7 * 0.86rem);
}
/* The highlight backdrop sits between line-numbers and the textarea */
.sql-highlight {
  position: absolute;
  top: 0; left: 38px; right: 0; bottom: 0;
  padding: 14px 14px 14px 14px;
  font-family: var(--mono);
  font-size: .9rem;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-all;
  pointer-events: none;
  color: #E2E8F0;
  z-index: 1;
  overflow: hidden;
  font-feature-settings: "liga" 1, "calt" 1;
  letter-spacing: 0.01em;
}
.sql-editor-bolt {
  position: relative;
  width: calc(100% - 38px);
  margin-left: 38px;
  background: transparent;
  border: none;
  outline: none;
  color: transparent;
  caret-color: var(--accent);
  font-family: var(--mono);
  font-size: .9rem;
  line-height: 1.7;
  padding: 14px 14px 14px 14px;
  resize: none;
  min-height: 120px;
  overflow-y: hidden;
  white-space: pre;
  tab-size: 4;
  z-index: 2;
  font-feature-settings: "liga" 1, "calt" 1;
  letter-spacing: 0.01em;
}
.sql-editor-bolt::placeholder {
  color: var(--text3);
  font-style: italic;
}
</style>
</head>

<script>
// ════════════════════════════════════════════════════════
// EXERCISES DATA
// ════════════════════════════════════════════════════════
const MODULES = [
  { id:1, icon:'#', title:'SELECT, WHERE e Filtros',         level:'Basico',        color:'mod-1', desc:'Fundamentos da leitura de dados: selecionar colunas, filtrar linhas e ordenar resultados.', topics:['SELECT','WHERE','ORDER BY','BETWEEN','IN','LIKE','Funcoes de data'] },
  { id:2, icon:'#', title:'Funcoes Agregadas e GROUP BY',   level:'Basico-Medio',  color:'mod-2', desc:'Resumir grandes volumes de dados usando funcoes de agregacao e agrupamento.',               topics:['COUNT','SUM','AVG','ROUND','GROUP BY','HAVING'] },
  { id:3, icon:'#', title:'JOINs',                           level:'Medio',         color:'mod-3', desc:'Combinar dados de multiplas tabelas usando diferentes tipos de JOIN.',                      topics:['INNER JOIN','LEFT JOIN','Self JOIN','COALESCE'] },
  { id:4, icon:'#', title:'Subqueries e CTEs',               level:'Medio',         color:'mod-4', desc:'Queries dentro de queries e expressoes de tabela comuns para codigo mais legivel.',         topics:['Subquery','IN (subquery)','Subquery correlacionada','WITH (CTE)'] },
  { id:5, icon:'#', title:'Window Functions',                level:'Avancado',      color:'mod-5', desc:'Calculos analiticos avancados sem colapsar linhas — o diferencial do analista senior.',     topics:['RANK() OVER','PARTITION BY','LAG()','SUM() OVER','CASE WHEN'] },
];

// level: 'estagio' | 'jr' | 'nao-estagio'
const EXERCISES = [
  {
    id:1, mod:1, db:'ecommerce',
    title:'Listando todos os clientes ativos',
    tags:['SELECT','WHERE','ORDER BY'],
    level:'estagio',
    levelLabel:'Questao de estagio',
    tables:['clientes'],
    problem:`Selecione o <strong>nome</strong>, <strong>email</strong> e <strong>cidade</strong> de todos os clientes que estao ativos. Ordene pelo nome em ordem alfabetica.`,
    solution:`<span class="kw">SELECT</span> nome, email, cidade\n<span class="kw">FROM</span>   <span class="tbl">clientes</span>\n<span class="kw">WHERE</span>  ativo <span class="kw">=</span> <span class="str">1</span>\n<span class="kw">ORDER BY</span> nome <span class="kw">ASC</span>;`,
    validate:(rows)=> rows.length>=7 && rows.every(r=>Object.keys(r).length===3),
    validateMsg:'Retorne 3 colunas (nome, email, cidade) filtrando apenas clientes ativos.',
  },
  {
    id:2, mod:1, db:'ecommerce',
    title:'Produtos por faixa de preco',
    tags:['WHERE','BETWEEN'],
    level:'estagio',
    levelLabel:'Questao de estagio',
    tables:['produtos'],
    problem:`Liste o nome, categoria e preço dos produtos com preço dentro de uma faixa intermediária (nem os mais baratos, nem os mais caros). Ordene do mais barato para o mais caro.`,
    hint:'O operador <strong>BETWEEN</strong> filtra por intervalo e inclui os dois extremos.',
    solution:`<span class="kw">SELECT</span> nome_produto, categoria, preco\n<span class="kw">FROM</span>   <span class="tbl">produtos</span>\n<span class="kw">WHERE</span>  preco <span class="kw">BETWEEN</span> <span class="str">200</span> <span class="kw">AND</span> <span class="str">1000</span>\n<span class="kw">ORDER BY</span> preco <span class="kw">ASC</span>;`,
    validate:(rows)=> rows.length>=5 && rows.every(r=>r.preco>=200 && r.preco<=1000),
    validateMsg:'Retorne apenas produtos com preco entre 200 e 1000.',
  },
  {
    id:3, mod:1, db:'ecommerce',
    title:'Pedidos com status especifico',
    tags:['WHERE','IN'],
    level:'estagio',
    levelLabel:'Questao de estagio',
    tables:['pedidos'],
    problem:`Encontre todos os pedidos que <strong>nao foram finalizados com sucesso</strong> — ou seja, que estao em andamento ou foram desfeitos. Mostre o identificador do pedido, o cliente, a data, o status e o valor total.`,
    fn_explain:{
      title:'Operador IN',
      content:`O operador <code>IN</code> filtra por multiplos valores de uma vez, substituindo varios <code>OR</code>.\nEquivalente a: <code>WHERE status = 'Cancelado' OR status = 'Processando'</code>`,
      syntax:`WHERE coluna IN ('valor1', 'valor2')`
    },
    solution:`<span class="kw">SELECT</span> pedido_id, cliente_id, data_pedido, status, total\n<span class="kw">FROM</span>   <span class="tbl">pedidos</span>\n<span class="kw">WHERE</span>  status <span class="kw">IN</span> (<span class="str">'Cancelado'</span>, <span class="str">'Processando'</span>)\n<span class="kw">ORDER BY</span> data_pedido;`,
    validate:(rows)=> rows.length>=2 && rows.every(r=>['Cancelado','Processando'].includes(r.status)),
    validateMsg:'Retorne apenas pedidos com status Cancelado ou Processando.',
  },
  {
    id:4, mod:1, db:'ecommerce',
    title:'Busca por texto parcial',
    tags:['LIKE'],
    level:'estagio',
    levelLabel:'Questao de estagio',
    tables:['produtos'],
    problem:`Liste os produtos da categoria de <strong>tecnologia/informatica</strong> cujo nome começa com a letra <strong>M</strong>, <strong>ou</strong> que contenham a sigla <strong>HD</strong> (referente a um tipo de armazenamento comum em hardware). Mostre nome, categoria e preco.`,
    fn_explain:{
      title:'Operador LIKE',
      content:`<code>LIKE</code> faz busca por padrao de texto. O <code>%</code> substitui qualquer sequencia de caracteres.`,
      syntax:`'M%'   — comeca com M\n'%HD%' — contem HD em qualquer posicao`
    },
    solution:`<span class="kw">SELECT</span> nome_produto, categoria, preco\n<span class="kw">FROM</span>   <span class="tbl">produtos</span>\n<span class="kw">WHERE</span>  categoria <span class="kw">=</span> <span class="str">'Informatica'</span>\n  <span class="kw">AND</span>  (nome_produto <span class="kw">LIKE</span> <span class="str">'M%'</span> <span class="kw">OR</span> nome_produto <span class="kw">LIKE</span> <span class="str">'%HD%'</span>);`,
    validate:(rows)=> rows.length>=1 && rows.every(r=>r.categoria==='Informatica'),
    validateMsg:'Retorne produtos da categoria Informatica que comecam com M ou contem HD.',
  },
  {
    id:5, mod:1, db:'ecommerce',
    title:'Pedidos de 2023',
    tags:['DATE','YEAR()'],
    level:'estagio',
    levelLabel:'Questao de estagio',
    tables:['pedidos'],
    problem:`Liste todos os pedidos de um <strong>ano especifico</strong> (consulte as tabelas para descobrir qual faz sentido filtrar). Mostre o identificador do pedido, a data, o status e o valor total — ordenando do mais recente para o mais antigo.`,
    hint:'No MySQL, extraia o ano da data com <code>YEAR(coluna_data)</code>. Alternativa universal: <code>BETWEEN \'2023-01-01\' AND \'2023-12-31\'</code>.',
    fn_explain:{
      title:'Funcoes de Data — MySQL',
      content:`No MySQL: <code>YEAR(data_pedido) = 2023</code> extrai o ano diretamente.\nAlternativa universal: <code>BETWEEN '2023-01-01' AND '2023-12-31'</code>`,
      syntax:`WHERE YEAR(data_pedido) = 2023`
    },
    solution:`<span class="kw">SELECT</span> pedido_id, data_pedido, status, total\n<span class="kw">FROM</span>   <span class="tbl">pedidos</span>\n<span class="kw">WHERE</span>  <span class="fn">YEAR</span>(data_pedido) <span class="kw">=</span> <span class="str">2023</span>\n<span class="kw">ORDER BY</span> data_pedido <span class="kw">DESC</span>;`,
    validate:(rows)=> rows.length>=5 && rows.every(r=>r.data_pedido&&r.data_pedido.startsWith('2023')),
    validateMsg:'Retorne apenas pedidos com data em 2023.',
  },
  // MOD 2
  {
    id:6, mod:2, db:'ecommerce',
    title:'Total de pedidos por status',
    tags:['COUNT','GROUP BY'],
    level:'estagio',
    levelLabel:'Questao de estagio',
    tables:['pedidos'],
    problem:`Conte quantos pedidos existem para cada <strong>situacao de entrega</strong>. Mostre a situacao e a quantidade, ordenando do maior para o menor.`,
    solution:`<span class="kw">SELECT</span>   status, <span class="fn">COUNT</span>(*) <span class="kw">AS</span> qtd_pedidos\n<span class="kw">FROM</span>     <span class="tbl">pedidos</span>\n<span class="kw">GROUP BY</span> status\n<span class="kw">ORDER BY</span> qtd_pedidos <span class="kw">DESC</span>;`,
    validate:(rows)=> rows.length>=3 && rows[0].hasOwnProperty('qtd_pedidos'),
    validateMsg:'Use COUNT(*) e GROUP BY status.',
  },
  {
    id:7, mod:2, db:'ecommerce',
    title:'Receita total por metodo de pagamento',
    tags:['SUM','GROUP BY','WHERE'],
    level:'estagio',
    levelLabel:'Questao de estagio',
    tables:['pedidos'],
    problem:`Calcule a <strong>receita total</strong> agrupada por <strong>forma de pagamento utilizada</strong>. Considere apenas pedidos que chegaram ao destino com sucesso. Ordene do maior faturamento para o menor.`,
    fn_explain:{
      title:'WHERE vs HAVING',
      content:`<code>WHERE</code> filtra linhas <strong>antes</strong> da agregacao.\n<code>HAVING</code> filtra grupos <strong>apos</strong> a agregacao.\nRegra pratica: se a condicao usa SUM/COUNT/AVG, use HAVING. Se nao, use WHERE.`,
      syntax:`FROM pedidos\nWHERE status = 'Entregue'   -- filtra linhas antes\nGROUP BY metodo_pagamento\nHAVING SUM(total) > 1000    -- filtra grupos depois`
    },
    solution:`<span class="kw">SELECT</span>   metodo_pagamento,\n         <span class="fn">SUM</span>(total) <span class="kw">AS</span> receita_total\n<span class="kw">FROM</span>     <span class="tbl">pedidos</span>\n<span class="kw">WHERE</span>    status <span class="kw">=</span> <span class="str">'Entregue'</span>\n<span class="kw">GROUP BY</span> metodo_pagamento\n<span class="kw">ORDER BY</span> receita_total <span class="kw">DESC</span>;`,
    validate:(rows)=> rows.length>=2 && rows[0].hasOwnProperty('receita_total'),
    validateMsg:'Use SUM(total), filtre status Entregue e agrupe por metodo_pagamento.',
  },
  {
    id:8, mod:2, db:'ecommerce',
    title:'Preco medio por categoria',
    tags:['AVG','ROUND','HAVING'],
    level:'jr',
    levelLabel:'Questao de Analista Jr.',
    tables:['produtos'],
    problem:`Calcule o <strong>preco medio</strong> dos produtos por categoria. Mostre apenas as categorias cujo preco medio supera um valor de referencia intermediario (olhe os dados para estimar). Arredonde para 2 casas decimais.`,
    hint:'Use <code>HAVING AVG(...) > valor</code> — o HAVING filtra apos a agregacao, diferente do WHERE que filtra antes.',
    solution:`<span class="kw">SELECT</span>   categoria,\n         <span class="fn">ROUND</span>(<span class="fn">AVG</span>(preco), <span class="str">2</span>) <span class="kw">AS</span> preco_medio\n<span class="kw">FROM</span>     <span class="tbl">produtos</span>\n<span class="kw">GROUP BY</span> categoria\n<span class="kw">HAVING</span>   <span class="fn">AVG</span>(preco) <span class="kw">></span> <span class="str">500</span>\n<span class="kw">ORDER BY</span> preco_medio <span class="kw">DESC</span>;`,
    validate:(rows)=> rows.length>=1 && rows.every(r=>r.preco_medio>500),
    validateMsg:'Retorne apenas categorias com preco medio > 500.',
  },
  {
    id:9, mod:2, db:'rh',
    title:'Salario medio por departamento',
    tags:['AVG','GROUP BY','JOIN'],
    level:'jr',
    levelLabel:'Questao de Analista Jr.',
    tables:['departamentos','funcionarios'],
    problem:`No banco <code>db_rh</code>, mostre o <strong>nome de cada area da empresa</strong>, o <strong>numero de colaboradores ativos</strong> nela e a <strong>remuneracao media</strong>. Ordene pela remuneracao media de forma decrescente.`,
    solution:`<span class="kw">SELECT</span>   d.nome_depto,\n         <span class="fn">COUNT</span>(f.func_id)       <span class="kw">AS</span> qtd_funcionarios,\n         <span class="fn">ROUND</span>(<span class="fn">AVG</span>(f.salario),2) <span class="kw">AS</span> salario_medio\n<span class="kw">FROM</span>     <span class="tbl">departamentos</span> d\n<span class="kw">JOIN</span>     <span class="tbl">funcionarios</span>  f <span class="kw">ON</span> d.depto_id <span class="kw">=</span> f.depto_id\n<span class="kw">WHERE</span>    f.ativo <span class="kw">=</span> <span class="str">1</span>\n<span class="kw">GROUP BY</span> d.depto_id, d.nome_depto\n<span class="kw">ORDER BY</span> salario_medio <span class="kw">DESC</span>;`,
    validate:(rows)=> rows.length>=3 && rows[0].hasOwnProperty('salario_medio'),
    validateMsg:'Retorne nome_depto, qtd funcionarios e salario medio.',
  },
  {
    id:10, mod:2, db:'ecommerce',
    title:'Produtos mais vendidos',
    tags:['SUM','GROUP BY','LIMIT'],
    level:'jr',
    levelLabel:'Questao de Analista Jr.',
    tables:['itens_pedido'],

  {

    fn_explain:{
      title:'Subquery Correlacionada',
      content:`Uma subquery correlacionada referencia colunas da query externa. Ela e executada <strong>uma vez por linha</strong> da query externa, calculando um resultado especifico para aquela linha (ex: media apenas do departamento daquela linha).`,

  {
    id:19, mod:4, db:'ecommerce',
    title:'Top produtos por receita usando CTE',
    tags:['WITH (CTE)','LIMIT'],
    level:'nao-estagio',
    levelLabel:'Nao cai em estagio — diferencial para Jr.',
    tables:['itens_pedido','produtos'],
    problem:`Use uma <strong>CTE</strong> para calcular a receita gerada por cada produto (quantidade vendida × preco unitario) e mostre os <strong>3 com maior receita</strong>, incluindo o nome do produto.`,
    hint:'Defina a CTE com <code>WITH nome AS (SELECT ...)</code>, depois use esse nome como se fosse uma tabela no SELECT principal. Faca JOIN com a tabela de produtos para buscar o nome.',
    fn_explain:{
      title:'CTE — Common Table Expression',
      content:`Uma <strong>CTE</strong> cria uma "tabela temporaria nomeada" que existe so durante a execucao. Torna o codigo muito mais legivel que subqueries aninhadas.\nVoce pode criar multiplas CTEs separadas por virgula.`,
      syntax:`WITH nome_cte AS (\n    SELECT col, SUM(val) AS total\n    FROM tabela\n    GROUP BY col\n)\nSELECT * FROM nome_cte\nORDER BY total DESC\nLIMIT 3;`
    },
    solution:`<span class="kw">WITH</span> receita_produto <span class="kw">AS</span> (\n    <span class="kw">SELECT</span>   produto_id,\n             <span class="fn">SUM</span>(quantidade * preco_unitario) <span class="kw">AS</span> receita\n    <span class="kw">FROM</span>     <span class="tbl">itens_pedido</span>\n    <span class="kw">GROUP BY</span> produto_id\n)\n<span class="kw">SELECT</span>  p.nome_produto, rp.receita\n<span class="kw">FROM</span>    receita_produto rp\n<span class="kw">JOIN</span>    <span class="tbl">produtos</span>        p <span class="kw">ON</span> rp.produto_id <span class="kw">=</span> p.produto_id\n<span class="kw">ORDER BY</span> rp.receita <span class="kw">DESC</span>\n<span class="kw">LIMIT</span> <span class="str">3</span>;`,
    validate:(rows)=> rows.length===3 && rows[0].hasOwnProperty('receita'),
    validateMsg:'Retorne exatamente 3 produtos com suas receitas usando CTE.',
  },
  {
    id:20, mod:4, db:'rh',
    title:'Relatorio de avaliacoes com CTE',
    tags:['WITH (CTE)','AVG','JOIN'],
    level:'nao-estagio',
    levelLabel:'Nao cai em estagio — diferencial para Jr.',
    tables:['avaliacoes','funcionarios'],
    problem:`Com uma CTE, calcule a <strong>media das avaliacoes por colaborador</strong> e mostre nome, cargo e media — apenas para quem atingiu um desempenho alto (consulte a escala de notas nos dados).`,
    hint:'A CTE calcula a media por identificador de funcionario. Na query principal, faca JOIN com a tabela de pessoas e filtre pela media minima desejada.',
    solution:`<span class="kw">WITH</span> media_aval <span class="kw">AS</span> (\n    <span class="kw">SELECT</span>   func_id,\n             <span class="fn">ROUND</span>(<span class="fn">AVG</span>(nota), <span class="str">1</span>) <span class="kw">AS</span> media_nota\n    <span class="kw">FROM</span>     <span class="tbl">avaliacoes</span>\n    <span class="kw">GROUP BY</span> func_id\n)\n<span class="kw">SELECT</span>  f.nome, f.cargo, ma.media_nota\n<span class="kw">FROM</span>    media_aval    ma\n<span class="kw">JOIN</span>    <span class="tbl">funcionarios</span> f <span class="kw">ON</span> ma.func_id <span class="kw">=</span> f.func_id\n<span class="kw">WHERE</span>   ma.media_nota <span class="kw">>=</span> <span class="str">8</span>\n<span class="kw">ORDER BY</span> ma.media_nota <span class="kw">DESC</span>;`,
    validate:(rows)=> rows.length>=3 && rows.every(r=>r.media_nota>=8),
    validateMsg:'Retorne funcionarios com nota media >= 8 usando CTE.',
  },
  // MOD 5
  {
    id:21, mod:5, db:'rh',
    title:'Ranking de funcionarios por salario no depto',
    tags:['RANK()','OVER','PARTITION BY'],
    level:'nao-estagio',
    levelLabel:'Nao cai em estagio — diferencial para Jr.',
    tables:['funcionarios','departamentos'],
    problem:`Para cada colaborador ativo, exiba nome, departamento, salario e uma coluna de <strong>posicao salarial dentro do proprio departamento</strong> (1 = maior salario do grupo).`,
    hint:'Use uma window function de ranking com <code>OVER (PARTITION BY ... ORDER BY ... DESC)</code>. O PARTITION BY faz o ranking reiniciar a cada grupo.',
    fn_explain:{
      title:'Window Functions — RANK() OVER (PARTITION BY)',
      content:`<strong>Window Functions</strong> calculam valores por "janela" sem colapsar as linhas (diferente de GROUP BY que elimina linhas).\n<code>PARTITION BY</code>: define os grupos (janelas).\n<code>ORDER BY</code>: define a ordem dentro de cada janela.\nOutras funcoes: <code>ROW_NUMBER()</code>, <code>DENSE_RANK()</code>, <code>SUM() OVER()</code>, <code>LAG()</code>.`,
      syntax:`RANK() OVER (\n    PARTITION BY depto_id   -- reinicia por departamento\n    ORDER BY salario DESC   -- maior salario = rank 1\n) AS rank_salario`
    },
    solution:`<span class="kw">SELECT</span>  f.nome, d.nome_depto, f.salario,\n        <span class="fn">RANK</span>() <span class="kw">OVER</span> (\n            <span class="kw">PARTITION BY</span> f.depto_id\n            <span class="kw">ORDER BY</span> f.salario <span class="kw">DESC</span>\n        ) <span class="kw">AS</span> rank_salario\n<span class="kw">FROM</span>    <span class="tbl">funcionarios</span>  f\n<span class="kw">JOIN</span>    <span class="tbl">departamentos</span> d <span class="kw">ON</span> f.depto_id <span class="kw">=</span> d.depto_id\n<span class="kw">WHERE</span>   f.ativo <span class="kw">=</span> <span class="str">1</span>\n<span class="kw">ORDER BY</span> d.nome_depto, rank_salario;`,
    validate:(rows)=> rows.length>=5 && rows[0].hasOwnProperty('rank_salario'),
    validateMsg:'Use RANK() OVER (PARTITION BY depto_id ORDER BY salario DESC).',
  },
  {
    id:22, mod:5, db:'ecommerce',
    title:'Receita acumulada mes a mes',
    tags:['SUM() OVER','DATE_FORMAT','CTE'],
    level:'nao-estagio',
    levelLabel:'Nao cai em estagio — diferencial para Jr.',
    tables:['pedidos'],
    problem:`Calcule a <strong>receita por mes</strong> e a <strong>receita acumulada</strong> mes a mes dos pedidos entregues em um determinado ano. Mostre: mes, receita do mes e o total acumulado ate aquele mes.`,
    hint:'Use uma CTE para agregar por mes com <code>DATE_FORMAT(data_pedido, \'%Y-%m\')</code>. Depois, na query principal, aplique <code>SUM(...) OVER (ORDER BY mes)</code> para calcular o acumulado progressivo.',
    fn_explain:{
      title:'SUM() OVER — Acumulado (Running Total)',
      content:`<code>SUM(col) OVER (ORDER BY outra)</code> calcula a soma acumulada: cada linha recebe a soma de todas as anteriores + ela mesma.\nSem PARTITION BY, o acumulado e global. Com PARTITION BY, reinicia por grupo.`,
      syntax:`SUM(receita_mes) OVER (\n    ORDER BY mes    -- acumula na ordem cronologica\n) AS receita_acumulada`
    },
    solution:`<span class="kw">WITH</span> mensal <span class="kw">AS</span> (\n    <span class="kw">SELECT</span>   <span class="fn">DATE_FORMAT</span>(data_pedido, <span class="str">'%Y-%m'</span>) <span class="kw">AS</span> mes,\n             <span class="fn">SUM</span>(total) <span class="kw">AS</span> receita_mes\n    <span class="kw">FROM</span>     <span class="tbl">pedidos</span>\n    <span class="kw">WHERE</span>    status <span class="kw">=</span> <span class="str">'Entregue'</span>\n      <span class="kw">AND</span>    <span class="fn">YEAR</span>(data_pedido) <span class="kw">=</span> <span class="str">2023</span>\n    <span class="kw">GROUP BY</span> mes\n)\n<span class="kw">SELECT</span>  mes, receita_mes,\n        <span class="fn">SUM</span>(receita_mes) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> mes) <span class="kw">AS</span> receita_acumulada\n<span class="kw">FROM</span>    mensal\n<span class="kw">ORDER BY</span> mes;`,
    validate:(rows)=> rows.length>=3 && rows[0].hasOwnProperty('receita_acumulada'),
    validateMsg:'Retorne mes, receita_mes e receita_acumulada com SUM() OVER.',
  },
  {
    id:23, mod:5, db:'rh',
    title:'Comparacao de avaliacao: ano atual vs anterior',
    tags:['LAG()','OVER','PARTITION BY'],
    level:'nao-estagio',
    levelLabel:'Nao cai em estagio — diferencial para Jr.',
    tables:['avaliacoes','funcionarios'],
    problem:`Para os colaboradores que possuem avaliacao em dois anos consecutivos, compare as notas usando <code>LAG()</code>. Mostre: nome, nota do ano anterior, nota do ano mais recente e a <strong>variacao</strong> entre os dois.`,
    hint:'Na CTE, use <code>LAG(coluna_nota) OVER (PARTITION BY id_funcionario ORDER BY coluna_ano)</code> para trazer a nota da linha anterior do mesmo colaborador. Na query principal, filtre apenas o ano mais recente e exclua quem nao tem nota anterior.',
    fn_explain:{
      title:'LAG() — Valor da linha anterior',
      content:`<code>LAG(col)</code> retorna o valor da linha <strong>anterior</strong> dentro da janela.\n<code>LEAD(col)</code> faz o oposto: proxima linha.\nMuito usado para comparar com periodos anteriores (mes passado, ano anterior, etc).`,
      syntax:`LAG(nota) OVER (\n    PARTITION BY func_id\n    ORDER BY ano\n) AS nota_anterior`
    },

    solution:`<span class="kw">WITH</span> receitas <span class="kw">AS</span> (\n    <span class="kw">SELECT</span>   produto_id,\n             <span class="fn">SUM</span>(quantidade * preco_unitario) <span class="kw">AS</span> receita\n    <span class="kw">FROM</span>     <span class="tbl">itens_pedido</span>\n    <span class="kw">GROUP BY</span> produto_id\n)\n<span class="kw">SELECT</span>  p.nome_produto, r.receita,\n        <span class="fn">ROUND</span>(r.receita * 100.0 / <span class="fn">SUM</span>(r.receita) <span class="kw">OVER</span> (), <span class="str">2</span>) <span class="kw">AS</span> pct_participacao\n<span class="kw">FROM</span>    receitas r\n<span class="kw">JOIN</span>    <span class="tbl">produtos</span> p <span class="kw">ON</span> r.produto_id <span class="kw">=</span> p.produto_id\n<span class="kw">ORDER BY</span> r.receita <span class="kw">DESC</span>;`,

// SIDEBAR
// ════════════════════════════════════════════════════════
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  let lastMod = 0;
  EXERCISES.forEach((ex, i) => {
    if (ex.mod !== lastMod) {
      lastMod = ex.mod;
      const m = MODULES[ex.mod - 1];
      const t = document.createElement('div');
      t.className = 'nav-module-title';
      t.textContent = `Modulo ${m.id} — ${m.title}`;
      nav.appendChild(t);
    }
    const item = document.createElement('div');
    const isDone = completed.has(i);
    const isActive = i === currentEx;
    item.className = `nav-item${isActive ? ' active' : ''}${isDone ? ' done' : ''}`;
    item.id = `nav-${i}`;
    item.innerHTML = `<div class="nav-check">${isDone ? '✓' : ''}</div><span class="nav-num">${String(ex.id).padStart(2,'0')}</span><span class="nav-item-title">${ex.title}</span>`;
    item.onclick = () => goTo(i);
    nav.appendChild(item);
  });
}

// TABLE PREVIEW RENDER
// ════════════════════════════════════════════════════════
function renderTablePreviews(tableNames) {
  const blocks = tableNames.map(name => {
    const data = TABLE_PREVIEWS[name];
    if (!data) return '';
    const heads = data.cols.map(c => `<th>${c}</th>`).join('');
    const rows = data.rows.map(r =>
      `<tr>${r.map(v => `<td>${v === null ? '<span class="null-val">NULL</span>' : v}</td>`).join('')}</tr>`
    ).join('');
    return `
      <div class="table-preview-block">
        <div class="table-preview-name"><span style="color:var(--text3)">TABLE</span> ${name}</div>
        <div class="preview-table-wrap">
          <table class="preview-table">
            <thead><tr>${heads}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="preview-rows-note">mostrando 3 de ${data.total} registros</div>
      </div>
    `;
  }).join('');

  return `
    <div class="table-previews">
      <div class="table-previews-title">Tabelas disponíveis</div>
      ${blocks}
    </div>
  `;
}

  const isRh = ex.db === 'rh';

  document.getElementById('btnNext').disabled = idx === EXERCISES.length - 1;

  const isFirstOfMod = idx === 0 || EXERCISES[idx - 1].mod !== ex.mod;
  const modHtml = isFirstOfMod ? `

  // Hint
  const hintHtml = ex.hint ? `<div class="problem-hint"><span>Dica:</span><span>${ex.hint}</span></div>` : '';

  // Save indicator
  const isSaved = completed.has(idx);
  const saveHtml = isSaved
    ? `<span class="save-indicator"><span class="save-dot"></span>Salvo</span>`
    : `<span class="save-indicator" style="color:var(--text3)">Nao salvo</span>`;

    <div class="ex-header-row">
      <div class="ex-number ${mod.color}">${String(ex.id).padStart(2,'0')}</div>
      <div class="ex-title-block">

        <div class="ex-meta">
          ${tagsHtml}
          ${renderLevelBadge(ex)}
        </div>
      </div>
    </div>

    ${fnHtml}

    <div class="problem-box">
      <p>${ex.problem}</p>
      ${hintHtml}
    </div>

    <div class="editor-wrap">
      <div class="editor-topbar">
        <div style="font-family:var(--mono);font-size:.75rem;font-weight:700;color:var(--accent);letter-spacing:1px">MySQL editor</div>

  `;

  const editor = document.getElementById('sqlEditor');
  if (editorStates[idx]) editor.value = editorStates[idx];
  initSqlEditor(editor);
  updateHighlight(editor);
  editor.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runQuery(); }
  });

  window.scrollTo(0, 0);
}

const TABLE_SCHEMA = {
  clientes:      [{Field:'cliente_id',Type:'INT',Null:'NO',Key:'PRI',Default:null},{Field:'nome',Type:'VARCHAR(100)',Null:'NO',Key:'',Default:null},{Field:'email',Type:'VARCHAR(100)',Null:'YES',Key:'',Default:null},{Field:'cidade',Type:'VARCHAR(80)',Null:'YES',Key:'',Default:null},{Field:'estado',Type:'CHAR(2)',Null:'YES',Key:'',Default:null},{Field:'data_cadastro',Type:'DATE',Null:'YES',Key:'',Default:null},{Field:'ativo',Type:'TINYINT',Null:'NO',Key:'',Default:'1'}],

  departamentos: [{Field:'depto_id',Type:'INT',Null:'NO',Key:'PRI',Default:null},{Field:'nome_depto',Type:'VARCHAR(60)',Null:'NO',Key:'',Default:null},{Field:'cidade',Type:'VARCHAR(60)',Null:'YES',Key:'',Default:null},{Field:'orcamento_anual',Type:'DECIMAL(12,2)',Null:'YES',Key:'',Default:null}],
  funcionarios:  [{Field:'func_id',Type:'INT',Null:'NO',Key:'PRI',Default:null},{Field:'nome',Type:'VARCHAR(100)',Null:'NO',Key:'',Default:null},{Field:'cargo',Type:'VARCHAR(80)',Null:'YES',Key:'',Default:null},{Field:'depto_id',Type:'INT',Null:'YES',Key:'MUL',Default:null},{Field:'salario',Type:'DECIMAL(10,2)',Null:'YES',Key:'',Default:null},{Field:'data_admissao',Type:'DATE',Null:'YES',Key:'',Default:null},{Field:'gestor_id',Type:'INT',Null:'YES',Key:'MUL',Default:null},{Field:'ativo',Type:'TINYINT',Null:'NO',Key:'',Default:'1'}],

function tryMetaCommand(sql, currentDb) {
  // Normalise: collapse whitespace, trim, uppercase for matching
  const norm = sql.replace(/\s+/g,' ').trim();
  const up   = norm.toUpperCase();

  // ── SHOW DATABASES ────────────────────────────────────
  if (/^SHOW\s+DATABASES\s*;?$/i.test(norm)) {
    const cols = ['Database'];
    const rows = [['db_ecommerce'],['db_rh']];
    return { cols, rows, meta: 'Bancos de dados disponíveis neste ambiente.' };
  }

  // ── SHOW TABLES ───────────────────────────────────────
  if (/^SHOW\s+TABLES\s*;?$/i.test(norm)) {
    const label = currentDb === 'rh' ? 'Tables_in_db_rh' : 'Tables_in_db_ecommerce';
    const list  = currentDb === 'rh' ? RH_TABLES : EC_TABLES;
    return { cols: [label], rows: list.map(t=>[t]), meta: null };
  }

  // ── SHOW TABLES FROM db ───────────────────────────────
  const stFrom = norm.match(/^SHOW\s+TABLES\s+(?:FROM|IN)\s+(\S+?)\s*;?$/i);
  if (stFrom) {
    const dbName = stFrom[1].replace(/`/g,'').toLowerCase();
    if (dbName === 'db_rh' || dbName === 'rh') {
      return { cols:['Tables_in_db_rh'], rows: RH_TABLES.map(t=>[t]), meta:null };
    }
    return { cols:['Tables_in_db_ecommerce'], rows: EC_TABLES.map(t=>[t]), meta:null };
  }

  // ── DESCRIBE / DESC / SHOW COLUMNS FROM ──────────────
  const descMatch = norm.match(/^(?:DESCRIBE|DESC)\s+`?(\w+)`?\s*;?$/i)
                 || norm.match(/^SHOW\s+COLUMNS\s+(?:FROM|IN)\s+`?(\w+)`?\s*;?$/i)
                 || norm.match(/^SHOW\s+FULL\s+COLUMNS\s+(?:FROM|IN)\s+`?(\w+)`?\s*;?$/i);
  if (descMatch) {
    const tbl = descMatch[1].toLowerCase();
    if (TABLE_SCHEMA[tbl]) {
      const cols = ['Field','Type','Null','Key','Default'];
      const rows = TABLE_SCHEMA[tbl].map(c=>[c.Field,c.Type,c.Null,c.Key,c.Default===null?'NULL':c.Default]);
      return { cols, rows, meta: `Estrutura da tabela: ${tbl}` };
    }
    return { error: `Tabela '${descMatch[1]}' nao encontrada. Tabelas disponíveis: ${(currentDb==='rh'?RH_TABLES:EC_TABLES).join(', ')}` };
  }

  // ── SHOW CREATE TABLE ─────────────────────────────────
  const sctMatch = norm.match(/^SHOW\s+CREATE\s+TABLE\s+`?(\w+)`?\s*;?$/i);
  if (sctMatch) {
    const tbl = sctMatch[1].toLowerCase();
    if (!TABLE_SCHEMA[tbl]) return { error: `Tabela '${sctMatch[1]}' nao encontrada.` };
    const fields = TABLE_SCHEMA[tbl].map(c=>`  \`${c.Field}\` ${c.Type}${c.Null==='NO'?' NOT NULL':''}${c.Key==='PRI'?' PRIMARY KEY':''}`).join(',\n');
    const ddl = `CREATE TABLE \`${tbl}\` (\n${fields}\n)`;
    return { cols:['Table','Create Table'], rows:[[tbl, ddl]], meta:null };
  }

  // ── SHOW STATUS / SHOW VARIABLES (stub) ──────────���───
  if (/^SHOW\s+(STATUS|VARIABLES|ENGINES|PROCESSLIST)\s*;?$/i.test(norm)) {
    return { cols:['Info'], rows:[['Comando suportado apenas no MySQL real. Neste ambiente, use SHOW TABLES ou DESCRIBE tabela.']], meta:null };
  }

  return null; // not a meta command
}

// ════════════════════════════════════════════════════════
// QUERY EXECUTION
// ════════════════════════════════════════════════════════
function runQuery() {
  const ex = EXERCISES[currentEx];
const sql = document.getElementById('sqlEditor').value.trim();
editorStates[currentEx] = sql;
saveQueries();

if (!sql) { showResult('error','Escreva uma query antes de executar.', null, null); return; }

  // ── Check for MySQL meta-commands first ───────────────
  const meta = tryMetaCommand(sql, ex.db);
  if (meta) {
    if (meta.error) { showResult('error', meta.error, null, null); return; }
    showResult('info', meta.meta || `${meta.rows.length} linha${meta.rows.length!==1?'s':''} retornada${meta.rows.length!==1?'s':''}.`, meta.rows.map(r=>{const o={};meta.cols.forEach((c,i)=>o[c]=r[i]);return o;}), meta.cols, true);
    return;
  }

  const db = ex.db === 'rh' ? db_rh : db_ecommerce;
  try {
    const results = db.exec(sql);
    if (!results || !results.length) { showResult('info','Query executada — nenhuma linha retornada.', [], null); return; }

    const { columns, values } = results[0];
    const rows = values.map(v => { const o={}; columns.forEach((c,i)=>o[c]=v[i]); return o; });

    let isCorrect = false;
    try { isCorrect = ex.validate(rows); } catch {}

    // Also accept if user result matches EXPECTED_ANSWERS structurally
    if (!isCorrect) {
      try {
        const exp = EXPECTED_ANSWERS[ex.id];
        if (exp && rows.length === exp.rows.length && rows.length > 0) {
          // Compare values row-by-row (order-insensitive for values, convert to strings)
          const userVals = rows.map(r => Object.values(r).map(v => String(v === null ? 'NULL' : v)).join('|')).sort();
          const expVals  = exp.rows.map(r => r.map(v => String(v === null ? 'NULL' : v)).join('|')).sort();
          isCorrect = userVals.every((v, i) => v === expVals[i]);
        }
      } catch {}
    }

    if (isCorrect) {
      if (!completed.has(currentEx)) {
        completed.add(currentEx);
        saveCompleted();
        updateProgress();
        buildSidebar();
        launchConfetti();
        showToast('Exercicio ' + ex.id + ' concluido e salvo!');
        const si = document.querySelector('.save-indicator');
        if (si) si.innerHTML = '<span class="save-dot"></span>Salvo';
      }
      showResult('correct', `Correto! ${rows.length} linha${rows.length!==1?'s':''} retornada${rows.length!==1?'s':''}.`, rows, columns);
    } else {
      showResult('wrong', `Resultado incorreto. ${ex.validateMsg||'Revise sua query.'}`, rows, columns);
    }
  } catch(err) {
    showResult('error', `Erro SQL: ${err.message||err}`, null, null);
  }
}

function showResult(type, text, rows, columns, isMeta) {
  const area = document.getElementById('resultArea');
  const icons = { correct:'✓', wrong:'✗', info:'i', error:'!' };
  let tableHtml = '';
  if (rows && rows.length > 0 && columns) {
    // For meta results, render multiline cell content (e.g. SHOW CREATE TABLE DDL)
    const heads = columns.map(c=>`<th>${c}</th>`).join('');
    const body = rows.slice(0,200).map(r=>
      `<tr>${columns.map(c=>{
        const v = r[c];
        if (v === null) return `<td><span class="null-val">NULL</span></td>`;
        // If value contains newlines (DDL), wrap in <pre>
        const str = String(v);
        if (str.includes('\n')) return `<td style="white-space:pre;vertical-align:top;font-family:var(--mono);font-size:.75rem;color:var(--accent)">${str}</td>`;
        return `<td>${str}</td>`;
      }).join('')}</tr>`
    ).join('');
    const more = rows.length>200 ? `<tr><td colspan="${columns.length}" style="text-align:center;color:var(--text3);padding:10px">... e mais ${rows.length-200} linhas</td></tr>` : '';
    tableHtml = `<div class="result-table-wrap"><table class="result-table"><thead><tr>${heads}</tr></thead><tbody>${body}${more}</tbody></table></div>`;
  } else if (rows && rows.length === 0) {
    tableHtml = `<div style="color:var(--text3);font-size:.8rem;font-family:var(--mono);padding:12px 0">Nenhuma linha retornada.</div>`;
  }
  const rowsLabel = (rows && !isMeta) ? `<span class="status-rows">${rows.length} rows</span>` : (rows && isMeta) ? `<span class="status-rows">${rows.length} row${rows.length!==1?'s':''}</span>` : '';
  area.innerHTML = `
    <div class="result-status ${type}">
      <span style="font-weight:700;font-family:var(--mono);font-size:1rem">${icons[type]}</span>
      <span class="status-text">${text}</span>
      ${rowsLabel}
    </div>
    ${tableHtml}
  `;
}

    const note = data.rows.length < 5 ? `<div style="font-size:.68rem;color:var(--text3);font-family:var(--mono);text-align:right;padding:4px 8px">${data.rows.length} linha${data.rows.length!==1?'s':''} no total</div>` : `<div style="font-size:.68rem;color:var(--text3);font-family:var(--mono);text-align:right;padding:4px 8px">mostrando 5 primeiras linhas</div>`;
    wrap.innerHTML = `<table class="result-table"><thead><tr>${heads}</tr></thead><tbody>${body}</tbody></table>${note}`;
  }
}

// ════════════════════════════════════════════════════════
// SQLBOLT-STYLE EDITOR
// ════════════════════════════════════════════════════════
const SQL_KEYWORDS = ['SELECT','FROM','WHERE','ORDER BY','GROUP BY','HAVING','JOIN','LEFT JOIN','RIGHT JOIN','INNER JOIN','ON','AS','AND','OR','NOT','IN','IS NULL','IS NOT NULL','BETWEEN','LIKE','LIMIT','OFFSET','DISTINCT','COUNT','SUM','AVG','MIN','MAX','ROUND','COALESCE','CASE','WHEN','THEN','ELSE','END','WITH','UNION','INSERT','UPDATE','DELETE','CREATE','DROP','ALTER','PARTITION BY','OVER','RANK','ROW_NUMBER','DENSE_RANK','LAG','LEAD','NULL','ASC','DESC','SHOW','SHOW TABLES','SHOW DATABASES','DESCRIBE','DESC'];

// ════════════════════════════════════════════════════════
// SQL SYNTAX HIGHLIGHT OVERLAY
// ════════════════════════════════════════════════════════
const HL_KEYWORDS = [
  'SELECT','FROM','WHERE','ORDER BY','GROUP BY','HAVING',
  'LEFT JOIN','RIGHT JOIN','INNER JOIN','FULL JOIN','CROSS JOIN','JOIN',
  'ON','AS','AND','OR','NOT','IN','IS NOT NULL','IS NULL',
  'BETWEEN','LIKE','LIMIT','OFFSET','DISTINCT',
  'COUNT','SUM','AVG','MIN','MAX','ROUND','COALESCE',
  'DATE_FORMAT','YEAR','MONTH','DAY',
  'CASE','WHEN','THEN','ELSE','END',
  'WITH','UNION','ALL',
  'INSERT','UPDATE','DELETE','CREATE','DROP','ALTER',
  'PARTITION BY','OVER','RANK','ROW_NUMBER','DENSE_RANK','LAG','LEAD',
  'NULL','ASC','DESC',
  'SHOW DATABASES','SHOW TABLES','SHOW COLUMNS','SHOW CREATE TABLE',
  'SHOW','DESCRIBE','DESC'
].sort((a,b)=>b.length-a.length); // longest first so ORDER BY beats BY etc.

function sqlHighlight(code) {
  // Escape HTML first
  let s = code
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');

  // We'll build a token-based replacement.
  // Strategy: walk through and replace token by token using markers
  // to avoid double-replacement.

  // 1) Strings (single-quoted) — replace with placeholder
  const strings = [];
  s = s.replace(/'([^']*)'/g, (_,inner)=>{
    strings.push(`<span style="color:#F6AD55">'${inner}'</span>`);
    return `\x00S${strings.length-1}\x00`;
  });

  // 2) Comments (-- ...)
  const comments = [];
  s = s.replace(/--(.*)/g, (_,rest)=>{
    comments.push(`<span style="color:#4A5568;font-style:italic">--${rest}</span>`);
    return `\x00C${comments.length-1}\x00`;
  });

  // 3) Numbers (do this FIRST before adding HTML tags that contain numbers)
  const numbers = [];
  s = s.replace(/\b(\d+(?:\.\d+)?)\b/g, (match) => {
    numbers.push(`<span style="color:#F6AD55">${match}</span>`);
    return `\x00N${numbers.length-1}\x00`;
  });

  // 4) Keywords (case-insensitive, whole-word)
  for (const kw of HL_KEYWORDS) {
    const re = new RegExp('(?<![\\w])' + kw.replace(/ /g,'\\s+') + '(?![\\w])', 'gi');
    s = s.replace(re, match => `<span class="hl-kw">${match}</span>`);
  }

  // 5) Functions that weren't caught (word followed by '(')
  s = s.replace(/\b([A-Za-z_][A-Za-z0-9_]*)(?=\s*\()/g, (match, fn) => {
    // Don't double-wrap already wrapped
    if (match.includes('<span') || match.includes('\x00')) return match;
    return `<span class="hl-fn">${fn}</span>`;
  });

  // 6) Restore numbers
  s = s.replace(/\x00N(\d+)\x00/g, (_,i)=>numbers[i]);

  // 7) Restore strings and comments
  s = s.replace(/\x00S(\d+)\x00/g, (_,i)=>strings[i]);
  s = s.replace(/\x00C(\d+)\x00/g, (_,i)=>comments[i]);

  return s;
}

function updateHighlight(editor) {
  const hl = document.getElementById('sqlHighlight');
  if (!hl) return;
  const val = editor.value;
  if (!val) { hl.innerHTML = ''; return; }
  hl.innerHTML = sqlHighlight(val);
  // Sync scroll
  hl.scrollTop = editor.scrollTop;
  hl.scrollLeft = editor.scrollLeft;
}

function updateLineNumbers(editor) {
  const lines = editor.value.split('\n');
  const container = document.getElementById('editorLines');
  if (!container) return;
  container.innerHTML = lines.map((_,i)=>`<div class="editor-line-num">${i+1}</div>`).join('');
}

function autoResizeEditor(editor) {
  editor.style.height = 'auto';
  editor.style.height = Math.max(110, editor.scrollHeight) + 'px';
}

function handleTab(e) {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const ta = e.target;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const spaces = '    '; // 4 spaces
  ta.value = ta.value.substring(0, start) + spaces + ta.value.substring(end);
  ta.selectionStart = ta.selectionEnd = start + 4;
}

function handleEnterAutoIndent(e) {
  if (e.key !== 'Enter') return;
  if (e.ctrlKey || e.metaKey) return;
  e.preventDefault();
  const ta = e.target;
  const start = ta.selectionStart;
  const lineStart = ta.value.lastIndexOf('\n', start - 1) + 1;
  const currentLine = ta.value.substring(lineStart, start);
  const indent = currentLine.match(/^(\s*)/)[1];

  // Auto-align: if line starts with a SQL keyword, keep indent; otherwise inherit
  const upper = currentLine.trimStart().toUpperCase();
  const autoKeywords = ['SELECT','FROM','WHERE','ORDER','GROUP','HAVING','JOIN','LEFT','RIGHT','INNER','ON','AND','OR','WITH','UNION','CASE','WHEN','THEN','ELSE','END','LIMIT'];
  const isKeywordLine = autoKeywords.some(k => upper.startsWith(k));

  const ins = '\n' + indent;
  ta.value = ta.value.substring(0, start) + ins + ta.value.substring(ta.selectionEnd);
  ta.selectionStart = ta.selectionEnd = start + ins.length;
  updateLineNumbers(ta);
  autoResizeEditor(ta);
}

function initSqlEditor(editor) {
  updateLineNumbers(editor);
  autoResizeEditor(editor);
  updateHighlight(editor);
  editor.addEventListener('input', () => { updateLineNumbers(editor); autoResizeEditor(editor); updateHighlight(editor); });
  editor.addEventListener('keydown', handleTab);
  editor.addEventListener('keydown', handleEnterAutoIndent);
  editor.addEventListener('scroll', () => {
    const lines = document.getElementById('editorLines');
    if (lines) lines.scrollTop = editor.scrollTop;
    const hl = document.getElementById('sqlHighlight');
    if (hl) { hl.scrollTop = editor.scrollTop; hl.scrollLeft = editor.scrollLeft; }
  });
}

function buildTablesPage(dbKey) {
  const ecSection = document.getElementById('tablesDbSectionEc');
  const rhSection = document.getElementById('tablesDbSectionRh');
  const pageTitle = document.getElementById('tablesPageTitle');
  const pageSub   = document.getElementById('tablesPageSub');

  // Show only the relevant DB section
  if (dbKey === 'ec') {
    ecSection.style.display = '';
    rhSection.style.display = 'none';
    pageTitle.textContent = 'db_ecommerce';
    pageTitle.style.background = 'linear-gradient(90deg, var(--accent), var(--accent2))';
    pageTitle.style.webkitBackgroundClip = 'text';
    pageTitle.style.webkitTextFillColor = 'transparent';
    pageSub.textContent = 'Tabelas do banco de dados de e-commerce.';
  } else {
    ecSection.style.display = 'none';
    rhSection.style.display = '';
    pageTitle.textContent = 'db_rh';
    pageTitle.style.background = 'linear-gradient(90deg, var(--purple), var(--accent2))';
    pageTitle.style.webkitBackgroundClip = 'text';
    pageTitle.style.webkitTextFillColor = 'transparent';
    pageSub.textContent = 'Tabelas do banco de dados de recursos humanos.';
  }

  const ecGrid = document.getElementById('tablesGridEc');
  const rhGrid = document.getElementById('tablesGridRh');
  if (ecGrid.dataset.built) return; // already built, just toggle visibility
  ecGrid.dataset.built = '1';
  rhGrid.dataset.built = '1';
  ecGrid.innerHTML = '';
  rhGrid.innerHTML = '';

  Object.entries(ALL_TABLES).forEach(([name, data]) => {
    const heads = data.cols.map(c=>`<th>${c}</th>`).join('');
    const rows = data.rows.map(r=>`<tr>${r.map(v=>`<td>${v===null?'<span class="null-val">NULL</span>':v}</td>`).join('')}</tr>`).join('');
    const html = `
      <div class="table-full-block">
        <div class="table-full-name">
          <span class="tbl-kw">TABLE</span>
          <span class="tbl-nm">${name}</span>
          <span class="tbl-count">${data.cols.length} colunas · ${data.total} registros</span>
        </div>
        <div class="table-full-wrap">
          <table class="preview-table" style="min-width:100%">
            <thead><tr>${heads}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="preview-rows-note">mostrando ${data.rows.length} de ${data.total} registros</div>
      </div>`;
    (data.db === 'ec' ? ecGrid : rhGrid).insertAdjacentHTML('beforeend', html);
  });
}

let tablesPageVisible = false;
let activeTableName = null;

function showTablesPage(dbKey) {
  tablesPageVisible = true;
  activeTableName = dbKey;
  document.getElementById('exerciseArea').style.display = 'none';
  document.getElementById('tablesPage').classList.add('active');
  // Highlight active button
  document.querySelectorAll('.sidebar-db-btn').forEach(el => el.classList.remove('active-db'));
  const btn = document.getElementById('dbbtn-' + dbKey);
  if (btn) btn.classList.add('active-db');
  buildTablesPage(dbKey);
}

function hideTablesPage() {
  tablesPageVisible = false;
  activeTableName = null;
  document.getElementById('exerciseArea').style.display = '';
  document.getElementById('tablesPage').classList.remove('active');
  document.querySelectorAll('.sidebar-db-btn').forEach(el => el.classList.remove('active-db'));
}
