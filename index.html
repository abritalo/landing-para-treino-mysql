// MODULES PAGE
// ════════════════════════════════════════════════════════
let modulesPageVisible = false;

function buildModulesPage() {
  const page = document.getElementById('modulesPage');
  if (page.dataset.built) return;
  page.dataset.built = '1';

  let html = `
    <div class="modules-page-header">
      <div class="modules-page-title">Modulos do Curso</div>
      <div class="modules-page-sub">Cada modulo aborda um conjunto de conceitos MySQL. Veja abaixo o que e esperado em cada um.</div>
    </div>
  `;

  const moduleDescriptions = {
    1: {
      title: 'SELECT, WHERE e Filtros',
      desc: 'Fundamentos da consulta SQL. Aprenda a selecionar colunas especificas, filtrar registros com WHERE, usar operadores de comparacao (=, <>, >, <, >=, <=), operadores logicos (AND, OR, NOT), filtrar por listas (IN), intervalos (BETWEEN), e padroes de texto (LIKE).',
      expectations: [
        'Selecionar colunas especificas de uma tabela',
        'Filtrar dados usando condicoes simples e compostas',
        'Usar LIKE para busca de padroes de texto',
        'Combinar multiplas condicoes com AND/OR',
        'Filtrar valores nulos com IS NULL / IS NOT NULL'
      ]
    },
    2: {
      title: 'Funcoes de Agregacao',
      desc: 'Domine funcoes que resumem dados: COUNT, SUM, AVG, MIN, MAX. Aprenda a agrupar dados com GROUP BY e filtrar grupos com HAVING.',
      expectations: [
        'Contar registros com COUNT()',
        'Somar valores com SUM()',
        'Calcular medias com AVG()',
        'Encontrar valores extremos com MIN() e MAX()',
        'Agrupar dados com GROUP BY',
        'Filtrar grupos com HAVING'
      ]
    },
    3: {
      title: 'JOINs e Relacionamentos',
      desc: 'Conecte tabelas relacionadas usando diferentes tipos de JOIN. Entenda como combinar dados de multiplas fontes.',
      expectations: [
        'Usar INNER JOIN para combinar registros correspondentes',
        'Usar LEFT JOIN para incluir todos os registros da tabela esquerda',
        'Usar RIGHT JOIN para incluir todos os registros da tabela direita',
        'Combinar mais de duas tabelas',
        'Entender aliases de tabela'
      ]
    },
    4: {
      title: 'Subconsultas',
      desc: 'Consultas dentro de consultas. Aprenda a usar subconsultas no WHERE, SELECT e FROM para resolver problemas complexos.',
      expectations: [
        'Criar subconsultas no WHERE',
        'Usar subconsultas com IN e NOT IN',
        'Subconsultas correlacionadas',
        'Subconsultas no SELECT (valores calculados)',
        'Usar EXISTS e NOT EXISTS'
      ]
    },
    5: {
      title: 'Funcoes Avancadas',
      desc: 'Funcoes de manipulacao de strings, datas, e funcoes condicionais como CASE WHEN. Nivel avancado de SQL.',
      expectations: [
        'Manipular strings com CONCAT, UPPER, LOWER, SUBSTRING',
        'Trabalhar com datas: YEAR, MONTH, DAY, DATEDIFF',
        'Usar CASE WHEN para logica condicional',
        'Funcoes de arredondamento: ROUND, CEIL, FLOOR',
        'Tratar valores nulos com COALESCE e IFNULL'
      ]
    }
  };

  for (const mod of MODULES) {
    const info = moduleDescriptions[mod.id] || { title: mod.title, desc: mod.desc, expectations: [] };
    const topicsHtml = mod.topics.map(t => `<span class="module-topic-link" onclick="hideModulesPage();showFunctionsPage('${t}')">${t}</span>`).join('');
    const expectationsHtml = info.expectations.map(e => `<li>${e}</li>`).join('');
    
    html += `
      <div class="module-info-card" style="margin-bottom:20px;cursor:pointer" onclick="hideModulesPage();goToModule(${mod.id})" title="Ir para o Módulo ${mod.id}">
        <div class="module-info-header">
          <span class="module-info-badge mod-${mod.id}">Modulo ${mod.id}</span>
          <span class="module-info-level">${mod.level}</span>
        </div>
        <div class="module-info-title">${info.title}</div>
        <div class="module-info-desc">${info.desc}</div>
        ${expectationsHtml ? `<ul style="margin:12px 0 12px 18px;color:var(--text2);font-size:.85rem;line-height:1.7">${expectationsHtml}</ul>` : ''}
        <div class="module-info-topics" onclick="event.stopPropagation()">${topicsHtml}</div>
        <div style="margin-top:14px;font-size:.72rem;color:var(--accent);font-family:var(--mono)">→ Ir para o módulo</div>
      </div>
    `;
  }

  page.innerHTML = html;
}

function showModulesPage() {
  modulesPageVisible = true;
  if (tablesPageVisible) hideTablesPage(true);
  if (functionsPageVisible) hideFunctionsPage(true);
  document.getElementById('exerciseArea').style.display = 'none';
  document.getElementById('modulesPage').classList.add('active');
  const modBtn = document.getElementById('modbtn-wiki');
  if (modBtn) modBtn.style.color = 'var(--accent)';
  buildModulesPage();
  setThemeFunctions();
}

function hideModulesPage(skipTheme) {
  modulesPageVisible = false;
  document.getElementById('modulesPage').classList.remove('active');
  const modBtn = document.getElementById('modbtn-wiki');
  if (modBtn) modBtn.style.color = 'var(--text3)';
  if (!skipTheme) {
    document.getElementById('exerciseArea').style.display = '';
    const ex = EXERCISES[currentEx];
    if (ex) setThemeByModule(ex.mod);
  }
}

// ════════════════════════════════════════════════════════
// THEME PICKER — com localStorage
// ════════════════════════════════════════════════════════
let currentGlobalTheme = localStorage.getItem('sqlpratica-theme') || 'neon';

const THEME_PALETTES = {
  neon:   { bg:'#0E1117', surface:'#161B27', surface2:'#1E2535', surface3:'#252D40', border:'#2A3348', border2:'#3A4560', accent:'#4FFFB0', accent2:'#00D4FF', text:'#F0F4FF', text2:'#C0CCDD', text3:'#5A6480', green:'#4FFFB0', red:'#FF6B6B', purple:'#C084FC', sidebarBg:'#161B27', dot:'#4FFFB0' },
  light:  { bg:'#F0F4F8', surface:'#FFFFFF', surface2:'#E8EFF5', surface3:'#D8E4ED', border:'#C5D4E0', border2:'#A8BDCC', accent:'#0D9488', accent2:'#0891B2', text:'#0F172A', text2:'#334155', text3:'#64748B', green:'#0D9488', red:'#DC2626', purple:'#7C3AED', sidebarBg:'#FFFFFF', dot:'#0D9488' },
  purple: { bg:'#050508', surface:'#0D0B14', surface2:'#13101C', surface3:'#1A1628', border:'#241E38', border2:'#352A52', accent:'#A78BFA', accent2:'#F472B6', text:'#EDE9FE', text2:'#C4B5FD', text3:'#6D5FA6', green:'#A78BFA', red:'#F87171', purple:'#F472B6', sidebarBg:'#0D0B14', dot:'#A78BFA' },
  amber:  { bg:'#0A0800', surface:'#141000', surface2:'#1C1700', surface3:'#252000', border:'#302800', border2:'#4A3D00', accent:'#FCD34D', accent2:'#FB923C', text:'#FFFBEB', text2:'#FDE68A', text3:'#78610A', green:'#FCD34D', red:'#F87171', purple:'#FB923C', sidebarBg:'#141000', dot:'#FCD34D' },
};

function applyThemePalette(theme) {
  const p = THEME_PALETTES[theme];
  if (!p) return;
  const r = document.documentElement.style;
  r.setProperty('--bg', p.bg);
  r.setProperty('--surface', p.surface);
  r.setProperty('--surface2', p.surface2);
  r.setProperty('--surface3', p.surface3);
  r.setProperty('--border', p.border);
  r.setProperty('--border2', p.border2);
  r.setProperty('--accent', p.accent);
  r.setProperty('--accent2', p.accent2);
  r.setProperty('--text', p.text);
  r.setProperty('--text2', p.text2);
  r.setProperty('--text3', p.text3);
  r.setProperty('--green', p.green);
  r.setProperty('--red', p.red);
  r.setProperty('--purple', p.purple);
  document.body.style.background = p.bg;
  // Sidebar e topbar
  const sidebar = document.querySelector('.sidebar');
  const topbar = document.querySelector('.topbar');
  if (sidebar) sidebar.style.background = p.sidebarBg;
  if (topbar) topbar.style.background = p.sidebarBg;
  // Dot do botão
  const dot = document.querySelector('.theme-picker-btn .tp-dot');
  if (dot) dot.style.background = p.dot;
  // Resetar module themes para nao conflitar
  if (theme !== 'neon') {
    // Sobrescreve theme-mod-* para usar as cores do tema global
    let styleTag = document.getElementById('dynamic-theme-override');
    if (!styleTag) { styleTag = document.createElement('style'); styleTag.id = 'dynamic-theme-override'; document.head.appendChild(styleTag); }
    styleTag.textContent = `
      body[class*="theme-mod-"], body[class*="theme-tables-"], body.theme-functions {
        --theme-accent: ${p.accent} !important;
        --theme-accent2: ${p.accent2} !important;
        --theme-bg: ${p.bg} !important;
        --accent: ${p.accent} !important;
        --accent2: ${p.accent2} !important;
        background: ${p.bg} !important;
      }
      .sidebar { background: ${p.sidebarBg} !important; }
      .topbar { background: ${p.sidebarBg} !important; }
      .btn-run { background: ${p.accent} !important; color: ${theme==='light'?'#fff':'#000'} !important; }
      .btn-run:hover { background: ${p.accent2} !important; }
      .sql-editor-bolt { caret-color: ${p.accent} !important; }
      .logo-text { background: linear-gradient(90deg, ${p.accent}, ${p.accent2}) !important; -webkit-background-clip: text !important; -webkit-text-fill-color: transparent !important; background-clip: text !important; }
      .progress-bar-fill { background: linear-gradient(90deg, ${p.accent}, ${p.accent2}) !important; }
    `;
  } else {
    const styleTag = document.getElementById('dynamic-theme-override');
    if (styleTag) styleTag.textContent = '';
  }
}

function toggleThemePicker() {
  const dd = document.getElementById('themePickerDropdown');
  dd.classList.toggle('open');
  if (dd.classList.contains('open')) {
    setTimeout(() => document.addEventListener('click', closeTpOnOutside, { once: true }), 10);
  }
}

function closeTpOnOutside(e) {
  const wrap = document.getElementById('themePickerWrap');
  if (wrap && !wrap.contains(e.target)) document.getElementById('themePickerDropdown').classList.remove('open');
}

function applyGlobalTheme(theme, el) {
  currentGlobalTheme = theme;
  localStorage.setItem('sqlpratica-theme', theme);
  // Remover classes globais antigas
  document.body.classList.remove('gtheme-light','gtheme-purple','gtheme-amber');
  if (theme !== 'neon') document.body.classList.add('gtheme-' + theme);
  // Aplicar paleta via CSS vars inline
  applyThemePalette(theme);
  // Atualizar active nos opts
  document.querySelectorAll('.theme-opt').forEach(o => o.classList.remove('active'));
  if (el) el.classList.add('active');
  else {
    const opt = document.querySelector(`.theme-opt[data-theme="${theme}"]`);
    if (opt) opt.classList.add('active');
  }
  document.getElementById('themePickerDropdown').classList.remove('open');
  // Re-aplicar badge do banco de dados com cores atuais
  const ex = EXERCISES[currentEx];
  if (ex) {
    const badge = document.getElementById('activeBadge');
    if (badge) {
      const p = THEME_PALETTES[theme];
      const isRh = ex.db === 'rh';
      badge.style.color = isRh ? p.purple : p.accent;
      badge.style.background = isRh ? 'rgba(192,132,252,.15)' : 'rgba(128,128,128,.15)';
      badge.style.borderColor = isRh ? 'rgba(192,132,252,.3)' : 'rgba(128,128,128,.3)';
    }
  }
}

// ════════════════════════════════════════════════════════
// NAVEGAR PARA MÓDULO (clique no badge do módulo)
// ════════════════════════════════════════════════════════
function goToModule(modId) {
  // Acha o primeiro exercício do módulo
  const idx = EXERCISES.findIndex(ex => ex.mod === modId);
  if (idx !== -1) {
    // Se estiver em outra página, fechar
    if (tablesPageVisible) hideTablesPage(true);
    if (functionsPageVisible) hideFunctionsPage(true);
    if (modulesPageVisible) hideModulesPage(true);
    document.getElementById('exerciseArea').style.display = '';
    goTo(idx);
  }
}

// ════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════
(async () => {
  // Timeout para evitar carregamento infinito (15 segundos)
  const loadingTimeout = setTimeout(() => {
    const msg = document.querySelector('.loading-msg');
    if (msg && document.getElementById('loadingScreen').style.display !== 'none') {
      msg.textContent = 'Carregamento demorado. Recarregue a pagina.';
      msg.style.color = '#FF6B6B';
    }
  }, 15000);

  try {
    await initDatabases();
    clearTimeout(loadingTimeout);
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('appLayout').style.display = 'flex';
    buildSidebar();
    renderExercise(0);
    updateProgress();
    // Restaurar tema salvo
    applyGlobalTheme(currentGlobalTheme, null);

    // Verificar se o editor esta visivel apos renderizacao
    setTimeout(() => {
      const editor = document.getElementById('sqlEditor');
      if (editor && (editor.offsetWidth === 0 || editor.offsetHeight === 0)) {
        console.warn('[v0] Editor pode estar invisivel. Forcando re-render...');
        renderExercise(currentEx);
      }
    }, 500);
  } catch(err) {
    clearTimeout(loadingTimeout);
    const msg = document.querySelector('.loading-msg');
    msg.textContent = 'Erro ao carregar: ' + err.message;
    msg.style.color = '#FF6B6B';
  }
})();
</script>
